
# Wrangler configuration for Animorphs game

# Global configuration
name = "animorphs"
main = "src/worker.js"
compatibility_date = "2023-05-10"
node_compat = true

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "animorphs-db"
database_id = "44cd43b3-629e-4cf6-88ea-f6999339abb1"

# R2 Bucket for assets
[[r2_buckets]]
binding = "ASSETS"
bucket_name = "animorphs-assets"

# Durable Objects
[[durable_objects.bindings]]
name = "PRESENCE_DO"
class_name = "PresenceDO"

# Migrations
[[migrations]]
tag = "v1"
new_classes = ["PresenceDO"]

# Environment variables
[vars]
NODE_ENV = "development"
EOS_CLIENT_ID = "xyza78914XQON5yBeLZvdyhqLtZUKriu"
EOS_CLIENT_SECRET = "Kxrh2Tmag20JFML8uFgBWxBRyvfWe0352B3jOCDKSjs"
EOS_ENVIRONMENT = "Release"
EOS_ENV_LIVE_SANDBOX_ID = "90eb223664704cb6ab8da2529a62d052"
EOS_ENV_RELEASE_ID = "c3b2637442224a31b5408418bdfbe9a6"

# Production environment
[env.production]
NODE_ENV = "production"
EOS_ENVIRONMENT = "Release"

# Custom routes
[routes]
pattern = "/api/*"
script = "src/worker.js"

# Triggers for cleaning up stale presence data
[triggers]
crons = ["*/10 * * * *"] # Run every 10 minutes

# Workers for specific functions
[env.db-worker]
name = "db-worker"
main = "worker-templates/db-worker.js"

[env.presence-worker]
name = "presence-worker"
main = "worker-templates/presence-worker.js"

[env.payment-worker]
name = "payment-worker"
main = "worker-templates/payment-worker.js"

[env.assets-worker]
name = "assets-worker"
main = "worker-templates/assets-worker.js"
